<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;My_AI Relay&quot;,&quot;short_name&quot;:&quot;Relay&quot;,&quot;start_url&quot;:&quot;/&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230f0f0f&quot;,&quot;theme_color&quot;:&quot;%230f0f0f&quot;}">
<title>My_AI Relay</title>
<link rel="stylesheet" href="/static/style.css?v=%%ASSET_VERSION%%">
</head>
<body>

<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-logo">&#x1F916;</span>
      <div>
        <div class="header-title">My_AI <span style="color: var(--accent); font-weight: 400;">Relay</span></div>
        <div class="header-subtitle" id="statusText">Connexion...</div>
      </div>
    </div>
    <div style="display: flex; align-items: center; gap: 10px;">
      <div class="status-dot connecting" id="statusDot"></div>
      <button class="clear-btn" onclick="clearChat()">Effacer</button>
    </div>
  </div>

  <!-- Connection banner -->
  <div class="connection-banner" id="connBanner">Connexion perdue. Tentative de reconnexion...</div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#x1F916;</div>
      <div class="welcome-title">My_AI Relay</div>
      <div class="welcome-text">Votre IA personnelle, accessible depuis votre mobile. Tapez un message pour commencer.</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <!-- Aperçus des pièces jointes (chips) -->
    <div class="attachments" id="attachments"></div>
    <div class="input-row">
      <button class="attach-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Joindre un fichier ou une image">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
      <input type="file" id="fileInput" style="display:none"
             accept="image/*,.pdf,.docx,.doc,.xlsx,.xls,.csv,.py,.js,.html,.css,.json,.xml,.md,.txt"
             onchange="handleFileSelect(event)">
      <div class="input-wrapper">
        <textarea id="messageInput" rows="1" placeholder="Tapez votre message..." autocomplete="off" autocorrect="on" autocapitalize="sentences"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Token injecté par le serveur -->
<script>window.__RELAY_TOKEN__ = "%%RELAY_TOKEN%%";</script>
<script src="/static/app.js?v=%%ASSET_VERSION%%"></script>
</body>
</html>
