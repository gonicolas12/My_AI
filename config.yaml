# Configuration de l'IA Personnelle

# ====================================
# CONFIGURATION GÉNÉRALE
# ====================================
ai:
  name: "My Personal AI"
  version: "7.9.0"
  description: "IA personnelle locale complète"
  
  # Paramètres généraux
  max_tokens: 10485760
  temperature: 0.7
  timeout: 120
  
  # Historique des conversations
  conversation_history_limit: 100
  save_conversations: true
  
  # Types de fichiers supportés
  supported_file_types:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".txt"
    - ".py"
    - ".html"
    - ".css"
    - ".js"
    - ".json"
    - ".xml"
    - ".md"

# ====================================
# MODÈLES DE LANGAGE
# ====================================
llm:
  # Backend par défaut (local uniquement)
  default_backend: "local"
  
  # Configuration locale
  local:
    model_type: "advanced_local_ai"
    knowledge_base: "advanced_knowledge.json"
    enable_learning: true
    conversation_memory: 10
    base_url: "http://localhost:11434"
    default_model: "qwen3.5:4b"
    # Température de génération (créativité, 0.0–1.0) — réglable via ⚙️ Réglages
    temperature: 0.7
    # Fenêtre de contexte de la réponse (num_ctx Ollama) — réglable via ⚙️ Réglages
    num_ctx: 16384
    # Timeout d'une requête LLM en secondes — réglable via ⚙️ Réglages
    # (1200 = comportement effectif historique de LocalLLM)
    timeout: 1200
    available_models:
      - "llama3.2"
      - "llama3.2:13b"
      - "llama3.2-vision"
      - "codellama"
      - "mistral"
      - "qwen3.5"
      - "qwen3.5:2b"
      - "qwen3.5:4b"
      - "qwen3.5:9b"
      - "qwen3.5:27b"
      - "minicpm-v"
      - "llava"
  
  # Configuration Transformers
  transformers:
    default_model: "microsoft/DialoGPT-medium"
    device: "auto"  # auto, cpu, cuda
    cache_dir: "models_cache"
    models:
      conversation:
        - "microsoft/DialoGPT-medium"
        - "microsoft/DialoGPT-large"
      code:
        - "Salesforce/codegen-350M-mono"
        - "microsoft/CodeBERT-base"

# ====================================
# TRAITEMENT DE FICHIERS
# ====================================
file_processing:
  # Taille maximale des fichiers (en MB)
  max_file_size_mb: 50
  
  # Répertoires
  temp_directory: "temp"
  backup_directory: "backups"
  output_directory: "outputs"
  
  # PDF
  pdf:
    preferred_library: "pymupdf"  # pymupdf, pypdf2
    extract_images: false
    extract_tables: true
  
  # DOCX
  docx:
    preserve_formatting: true
    extract_tables: true
    extract_images: false

# ====================================
# GÉNÉRATION DE CONTENU
# ====================================
generation:
  # Répertoire de sortie
  output_directory: "outputs"
  
  # Templates de code
  code_templates:
    python:
      include_docstrings: true
      include_type_hints: true
      style: "pep8"
    
    javascript:
      style: "modern"  # modern, classic
      include_jsdoc: true
    
    html:
      include_css: true
      include_javascript: true
      responsive: true
  
  # Documents
  documents:
    default_format: "pdf"  # pdf, docx, txt
    include_metadata: true
    include_timestamp: true

    pdf:
      page_size: "A4"
      margins: 20  # mm
      font_family: "Arial"
      font_size: 12

    docx:
      style_template: "default"
      include_toc: false

# ====================================
# GÉNÉRATION D'IMAGES (texte → image, 100% local)
# ====================================
# Ferme la symétrie multimodale : l'ENTRÉE vision existe déjà (Ollama
# minicpm-v/llava), cette section ajoute la SORTIE image. Calque le pattern
# Ollama : on parle à un backend Stable Diffusion LOCAL en HTTP (localhost),
# avec dégradation propre si aucun backend (message clair, comme le fallback
# Ollama). Voir models/image_generation.py.
image_generation:
  # Active la fonctionnalité (intention "génère une image de…").
  enabled: true
  # Backend : auto | automatic1111 | comfyui | diffusers
  #   - automatic1111 : API AUTOMATIC1111 / Forge WebUI (recommandé, défaut)
  #                     démarrer la WebUI avec --api (Forge conseillé en 6 Go VRAM,
  #                     ajouter --medvram). Coexiste avec Ollama via services séparés.
  #   - comfyui       : API ComfyUI (workflow par graphe), très économe en VRAM.
  #   - diffusers     : pipeline Python en process (deps lourdes + torch CUDA),
  #                     déconseillé sur petite VRAM partagée avec Ollama.
  #   - auto          : essaie automatic1111 puis comfyui puis diffusers.
  backend: "automatic1111"
  # Endpoints HTTP des backends locaux
  automatic1111_url: "http://127.0.0.1:7860"
  comfyui_url: "http://127.0.0.1:8188"
  # Auto-installation au 1er usage : si aucun backend n'est détecté, My_AI
  # télécharge et lance automatiquement ComfyUI portable (Windows/NVIDIA,
  # Python+CUDA embarqués — n'altère pas l'environnement de My_AI) dans tools/.
  # Téléchargement ~2-2.5 Go + 1 modèle ~2.5 Go la 1ʳᵉ fois, avec progression.
  # Mettre à false pour exiger une installation manuelle (Forge/ComfyUI).
  auto_setup: true
  # Sources de l'auto-installation (surchargeables si besoin)
  comfyui_portable_url: "https://github.com/comfyanonymous/ComfyUI/releases/latest/download/ComfyUI_windows_portable_nvidia.7z"
  comfyui_model_url: "https://huggingface.co/stabilityai/sd-turbo/resolve/main/sd_turbo.safetensors"
  comfyui_model_filename: "sd_turbo.safetensors"
  # Paramètres de génération par défaut (512x512 adapté à 6 Go VRAM)
  width: 512
  height: 512
  steps: 25
  cfg_scale: 7.0
  sampler: "DPM++ 2M Karras"
  negative_prompt: "lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, jpeg artifacts, signature, watermark, blurry"
  # Modèle utilisé uniquement si backend: diffusers
  diffusers_model: "stabilityai/sd-turbo"
  # Timeout d'une génération en secondes (une image peut être lente sur CPU/petite VRAM)
  timeout: 300

# ====================================
# INTERFACE UTILISATEUR
# ====================================
ui:
  # Lecture vocale automatique des réponses de l'IA (TTS) — réglable via ⚙️ Réglages
  tts_autoread: false
  # CLI
  cli:
    prompt: "🤖 MyAI> "
    show_typing_indicator: true
    max_display_width: 80
    colors:
      primary: "blue"
      success: "green"
      error: "red"
      warning: "yellow"
  
  # GUI (futur)
  gui:
    title: "My Personal AI Assistant"
    theme: "light"  # light, dark
    window_size: "800x600"

# ====================================
# SÉCURITÉ
# ====================================
security:
  # Validation des entrées
  validate_inputs: true
  max_query_length: 10000
  
  # Fichiers
  scan_uploads: true
  allowed_extensions:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".py"
    - ".html"
    - ".css"
    - ".js"
  
  # Contenu malveillant
  block_scripts: true
  block_exec_commands: true

# ====================================
# LOGGING
# ====================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  directory: "logs"
  max_file_size_mb: 10
  backup_count: 5
  
  # Format des logs
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  date_format: "%Y-%m-%d %H:%M:%S"
  
  # Composants à logger
  components:
    ai_engine: true
    llm_manager: true
    file_processor: true
    conversation: true

# ====================================
# PERFORMANCE
# ====================================
performance:
  # Cache
  enable_cache: true
  cache_size_mb: 100
  cache_ttl_hours: 24
  
  # Traitement parallèle
  max_workers: 4
  chunk_size: 1024
  
  # Mémoire
  max_memory_usage_mb: 2048
  gc_threshold: 1000

# ====================================
# DÉVELOPPEMENT
# ====================================
development:
  debug_mode: false
  profiling: false
  
  # Tests
  test_data_directory: "tests/data"
  mock_llm_responses: false
  
  # Métriques
  collect_metrics: true
  metrics_file: "logs/metrics.json"


# === OPTIMISATIONS AVANCEES ===
optimization:
  # RAG (Retrieval-Augmented Generation)
  rag:
    enabled: true
    # Aligné sur la limite d'input de all-MiniLM-L6-v2 (256 tokens)
    # pour éviter la troncature silencieuse lors du calcul d'embedding
    chunk_size: 256
    chunk_overlap: 32
    max_retrieved_chunks: 3
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    vector_store_path: "./data/vector_store"
    
  # Context Window Optimization
  context_optimization:
    enabled: true
    max_context_tokens: 8192
    compression_enabled: true
    sliding_window_size: 4096
    memory_efficient_attention: true
    
  # Fine-tuning
  fine_tuning:
    enabled: false  # Activer manuellement
    model_base: "microsoft/DialoGPT-medium"
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    learning_rate: 2e-5
    batch_size: 4
    num_epochs: 3
    
  # Performance Monitoring
  monitoring:
    enabled: true
    log_performance_metrics: true
    benchmark_interval: 3600  # 1 heure
    max_memory_usage_mb: 2048
    
  # Cache System
  cache:
    enabled: true
    embedding_cache_size: 1000
    response_cache_size: 500
    cache_ttl: 3600  # 1 heure

# ====================================
# MODEL CONTEXT PROTOCOL (MCP)
# ====================================
mcp:
  # Outils locaux (toujours actifs, pas de dépendance externe)
  local_tools:
    web_search: true
    search_memory: true
    read_local_file: true
    list_directory: true
    generate_code: true
    calculate: true

  # Serveurs MCP externes (optionnels, nécessitent Node.js via npx ou Python via uvx)
  # Mettre enabled: true pour activer, false pour ignorer
  servers:

    # Accès au système de fichiers local
    # Requiert: Node.js — npx @modelcontextprotocol/server-filesystem
    filesystem:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-filesystem", "./"]

    # Accès aux dépôts Git (lecture de code, commits, branches)
    # Requiert: Node.js — npx @modelcontextprotocol/server-git
    git:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-git", "--repository", "."]

    # Accès aux bases SQLite (mémoire, conversations)
    # Requiert: Node.js — npx @modelcontextprotocol/server-sqlite
    sqlite:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-sqlite", "memory/vector_store/chroma.db"]

    # Raisonnement structuré séquentiel (chaînes de pensée)
    # Requiert: Node.js — npx @modelcontextprotocol/server-sequential-thinking
    sequential_thinking:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-sequential-thinking"]

    # Recherche Brave (alternative locale à DuckDuckGo)
    # Requiert: clé API Brave + Node.js
    brave_search:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-brave-search"]
      env:
        BRAVE_API_KEY: "${BRAVE_API_KEY}"

    # Fetch HTTP (récupération de pages web)
    # Requiert: Node.js — npx @modelcontextprotocol/server-fetch
    fetch:
      enabled: false
      command: "npx"
      args: ["@modelcontextprotocol/server-fetch"]

# ====================================
# CLÉS API
# ====================================
# ====================================
# API REST LOCALE
# ====================================
api:
  enabled: false
  host: "127.0.0.1"
  port: 8000
  cors_origins: ["http://localhost:*"]

# ====================================
# MY_AI RELAY (Accès mobile)
# ====================================
relay:
  # Démarrage automatique au lancement du GUI
  auto_start: false
  # Port du serveur Relay (WebSocket + interface mobile)
  port: 8765
  # Délai max d'attente de la réponse IA (en secondes)
  # Augmenter si les réponses sont longues ou avec pièces jointes volumineuses
  response_timeout: 500
  # Mot de passe pour l'authentification mobile
  # Si vide, un token aléatoire sera généré à chaque démarrage
  password: ""
  # Activer le tunnel pour l'accès hors réseau local.
  # Si true, démarre tous les providers listés dans tunnel_providers
  # en parallèle. Le QR code redirige le téléphone vers le premier
  # tunnel joignable via une page de routage GitHub Pages.
  tunnel: true
  # Liste des providers de tunnel à démarrer en parallèle. Plusieurs
  # providers garantissent qu'au moins un est joignable même si un
  # opérateur mobile filtre certains domaines (ex. *.trycloudflare.com
  # bloqué chez certains MVNO 5G en France).
  #   - "cloudflared"    : *.trycloudflare.com (auto-téléchargé dans tools/)
  #   - "serveo"         : *.serveo.net (via SSH, anonyme)
  #   - "localhost.run"  : *.lhr.life (via SSH, anonyme)
  # Pour ne garder qu'un seul provider : tunnel_providers: ["cloudflared"]
  tunnel_providers:
    - "cloudflared"
    - "serveo"
    - "localhost.run"
  # Adresse d'écoute (0.0.0.0 = toutes les interfaces)
  host: "0.0.0.0"

# ====================================
# WORKSPACES / SESSIONS
# ====================================
workspaces:
  directory: "data/workspaces"
  auto_save: true
  auto_save_interval: 300  # secondes
  max_workspaces: 50

# ====================================
# KNOWLEDGE BASE STRUCTURÉE
# ====================================
knowledge_base:
  directory: "data/knowledge_base"
  auto_extract: true
  max_facts: 10000

# ====================================
# SCHEDULER (exécution récurrente d'agents/workflows)
# ====================================
# Transforme l'assistant réactif en assistant proactif : planifie des agents,
# workflows visuels ou débats de façon récurrente (type cron). 100% local — la
# boucle tourne tant que le GUI ou le Relay est lancé (pas de service système).
scheduler:
  # Active la boucle de planification au démarrage du GUI / Relay.
  enabled: true
  # Intervalle (secondes) entre deux vérifications des tâches dues (min 5).
  check_interval: 30
  # Exécuter au prochain démarrage les tâches dont l'échéance a été manquée
  # (app fermée à l'heure prévue).
  run_missed_on_startup: true
  # Ne rattraper que les tâches manquées dans cette fenêtre (heures). Au-delà,
  # la tâche est simplement resynchronisée sur sa prochaine échéance.
  catch_up_window_hours: 24
  # Nombre d'entrées d'historique de runs conservées dans le fichier JSON.
  max_history: 200
  # Persistance des définitions de tâches (cohérent avec data/custom_agents.json).
  tasks_file: "data/scheduled_tasks.json"
  # Répertoire des rapports de résultats (un .md par exécution).
  output_directory: "outputs/scheduled"
  # Verrou inter-processus (coordination GUI/Relay <-> runner Windows).
  lock_file: "data/scheduler.lock"
  # Exécution en arrière-plan (Planificateur de tâches Windows) : le runner
  # headless s'exécute toutes les N minutes même appli fermée. Activable via le
  # bouton « Exécuter même l'appli fermée » de la page Agents. Voir
  # core/scheduler_runner.py et docs/SCHEDULER.md. 1 = plancher Windows
  # (schtasks /SC MINUTE), au plus 1 min de délai quand l'appli est fermée.
  background_interval_minutes: 1
  windows_task_name: "My_AI Scheduler"
  # Notification OS à la fin d'une tâche (winotify/plyer si installés, sinon
  # toast in-app dans le GUI). Voir requirements.txt.
  notify_desktop: true
  # Diffuser un message WebSocket aux mobiles connectés (via le Relay).
  notify_mobile: true

# ====================================
# HISTORIQUE COMMANDES
# ====================================
command_history:
  enabled: true
  max_entries: 5000
  db_path: "data/command_history.db"

# ====================================
# EXPORT CONVERSATIONS
# ====================================
export:
  output_directory: "outputs/exports"
  default_format: "markdown"
  include_metadata: true

# ====================================
# DÉTECTION DE LANGUE
# ====================================
language:
  auto_detect: true
  default: "fr"
  supported: ["fr", "en", "es", "de", "it", "pt", "nl", "ru", "zh", "ja", "ko", "ar"]

# ====================================
# CACHE WEB
# ====================================
web_cache:
  enabled: true
  ttl_seconds: 3600
  max_entries: 1000
  directory: "data/web_cache"

# ====================================
# RÉSEAU / PROXY / TLS
# ====================================
network:
  # Si true, les variables d'environnement existantes (HTTP_PROXY, etc.)
  # sont prioritaires. Si false, les valeurs ci-dessous peuvent les écraser.
  prefer_environment: true

  # Option simple : un seul proxy pour HTTP et HTTPS.
  # Exemple: "http://user:pass@proxy.company.com:8080"
  proxy_url: ""

  # Options avancées (laisse vide si non utilisé)
  http_proxy: ""
  https_proxy: ""
  all_proxy: ""
  no_proxy: "localhost,127.0.0.1,::1"

  # Chemin vers un bundle CA (certificat racine entreprise), si nécessaire.
  # Exemple Windows: "C:/certs/company-root-ca.pem"
  ca_bundle: ""

  # Utilise le magasin de certificats système Python/OpenSSL.
  use_system_truststore: true

  # Désactive la vérification TLS (SECURITE REDUITE) - dernier recours uniquement.
  allow_insecure_ssl: false

# ====================================
# CLÉS API
# ====================================
github:
  token: "${GITHUB_TOKEN}"
